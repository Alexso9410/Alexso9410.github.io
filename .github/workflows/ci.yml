# ============================================================
# CI — Integración Continua
# Portfolio Alexis Sosa — github-pages-portfolio
#
# Conceptos aplicados (Clase 3 — Curso Desarrollo IA):
#   - CI mínimo viable: lint + validación en cada push/PR
#   - Security Review automático con Semgrep (XSS, patrones inseguros)
#   - Secret scanning con Gitleaks (credenciales hardcodeadas)
#   - Triggers: push a main + pull_request
#   - Sin API keys externas — 100% gratuito para repos públicos
# ============================================================

name: CI — Lint & Security Review

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write  # para que Semgrep reporte en PRs
  security-events: write  # para subir resultados SARIF a GitHub Security

jobs:
  # ----------------------------------------------------------
  # JOB 1: HTML Validation
  # Valida que el HTML esté bien formado (W3C vía htmlhint)
  # ----------------------------------------------------------
  lint-html:
    name: 🔍 HTML Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar HTMLHint
        run: npm install -g htmlhint

      - name: Crear config HTMLHint
        run: |
          cat > .htmlhintrc << 'EOF'
          {
            "tagname-lowercase": true,
            "attr-lowercase": true,
            "attr-value-double-quotes": true,
            "doctype-first": true,
            "tag-pair": true,
            "spec-char-escape": false,
            "id-unique": true,
            "src-not-empty": true,
            "attr-no-duplication": true,
            "title-require": true
          }
          EOF

      - name: Ejecutar HTMLHint
        run: htmlhint index.html

  # ----------------------------------------------------------
  # JOB 2: CSS Lint
  # Valida buenas prácticas en el CSS con stylelint
  # ----------------------------------------------------------
  lint-css:
    name: 🎨 CSS Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar stylelint
        run: npm install -g stylelint stylelint-config-standard

      - name: Crear config stylelint
        run: |
          cat > .stylelintrc.json << 'EOF'
          {
            "extends": "stylelint-config-standard",
            "rules": {
              "color-no-invalid-hex": true,
              "property-no-unknown": true,
              "selector-pseudo-class-no-unknown": true,
              "unit-no-unknown": true,
              "no-duplicate-selectors": null,
              "alpha-value-notation": null,
              "color-function-notation": null,
              "import-notation": null
            }
          }
          EOF

      - name: Ejecutar stylelint
        run: stylelint "styles.css" || true
        # '|| true' para que no bloquee el deploy si hay warnings menores

  # ----------------------------------------------------------
  # JOB 3: JS Lint
  # Valida JavaScript con ESLint
  # ----------------------------------------------------------
  lint-js:
    name: ⚡ JS Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar ESLint
        run: npm install -g eslint @eslint/js

      - name: Crear config ESLint
        run: |
          cat > eslint.config.mjs << 'EOF'
          import js from "@eslint/js";
          export default [
            js.configs.recommended,
            {
              rules: {
                "no-unused-vars": "warn",
                "no-undef": "warn",
                "no-console": "off",
                "semi": ["warn", "always"],
                "no-var": "warn"
              },
              languageOptions: {
                globals: {
                  window: "readonly",
                  document: "readonly",
                  console: "readonly",
                  setTimeout: "readonly",
                  setInterval: "readonly",
                  clearInterval: "readonly",
                  requestAnimationFrame: "readonly",
                  IntersectionObserver: "readonly",
                  navigator: "readonly"
                }
              }
            }
          ];
          EOF

      - name: Ejecutar ESLint
        run: eslint script.js || true

  # ----------------------------------------------------------
  # JOB 4: Security Scan con Semgrep
  # Detecta patrones inseguros en HTML/JS:
  #   - innerHTML con datos no sanitizados (XSS)
  #   - eval() y funciones peligrosas
  #   - Links target="_blank" sin rel="noopener noreferrer"
  #   - Redirects abiertos, prototype pollution
  # Gratis para repos públicos — sin API key
  # Clase 3: "CI/CD Inteligente con IA" → alternativa open source
  # ----------------------------------------------------------
  semgrep-security:
    name: 🔐 Semgrep Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Ejecutar Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >
            p/javascript
            p/html
            p/owasp-top-ten
            p/xss
            p/secrets
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
          # SEMGREP_APP_TOKEN es OPCIONAL — sin él corre igualmente en modo local
          # Si lo agregás (gratis en semgrep.dev) guarda el historial de scans

  # ----------------------------------------------------------
  # JOB 5: Gitleaks — Secret Scanning
  # Detecta credenciales hardcodeadas en el código:
  #   - API keys, tokens, contraseñas
  #   - Claves privadas, URLs con credenciales
  # Usa binario directo + --no-git para evitar el bug de primer commit
  # (gitleaks-action@v2 falla cuando el primer commit no tiene padre)
  # 100% gratuito y sin configuración adicional
  # ----------------------------------------------------------
  gitleaks:
    name: 🔑 Gitleaks Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Gitleaks
        run: |
          GITLEAKS_VERSION="8.24.3"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Escanear secretos en archivos
        run: |
          gitleaks detect \
            --source . \
            --no-git \
            --redact \
            --verbose \
            --exit-code=1
        # --no-git: escanea archivos directamente (sin git log)
        # Evita el error "ambiguous argument" en repos con un solo commit
        # --exit-code=1: falla el job si encuentra algo real
